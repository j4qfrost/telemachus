# Self-hosted CI (snowman Forgejo + Woodpecker). GitHub Actions is intentionally
# not used. Local signal: `woodpecker exec --pipeline-event push`.
when:
  - event: [push, pull_request]

steps:
  - name: test
    image: python:3.12
    commands:
      # Single combined install keeps the layer/cache simple; dev deps add ruff +
      # pytest(+randomly). No Node step — tests/test_compare_js.py self-skips when
      # `node` is absent, so coverage does not regress and the image stays Node-free.
      - python -m pip install --quiet --upgrade pip
      - pip install -r requirements.txt -r requirements-dev.txt
      - ruff check .
      - python -m py_compile $(git ls-files '*.py')
      - pytest -q

  # Reproducible Nix dev shell smoke — proves flake.nix resolves and the pinned
  # py312 + ruff toolchain comes up. Mirrors `nix flake check` (the ruff gate)
  # locally. Tarball-pinned nixpkgs means no api.github.com dependency.
  - name: nix-shell
    image: nixos/nix:2.24.9
    environment:
      NIX_CONFIG: "experimental-features = nix-command flakes"
    commands:
      - nix develop -c python --version
      - nix develop -c ruff --version
      - nix flake check
