# Self-hosted CI (snowman Forgejo + Woodpecker) — tests + lint on every push/PR.
# Releases live in .woodpecker/release.yml (OCI image + Linux bundle, on tag).
# GitHub Actions is used ONLY for the macOS/Windows desktop bundles this Linux
# agent can't build (.github/workflows/release.yml). Local signal for this file:
# `woodpecker exec --pipeline-event push .woodpecker/ci.yml`.
when:
  - event: [push, pull_request]

steps:
  - name: test
    image: python:3.12@sha256:7557a379eb0d26af063ce19906a463c7f60fb4bd03a39dea2e7ee49b7aaafc0e
    commands:
      # Single combined install keeps the layer/cache simple; dev deps add ruff +
      # pytest(+randomly). No Node step — tests/test_compare_js.py self-skips when
      # `node` is absent, so coverage does not regress and the image stays Node-free.
      - python -m pip install --quiet --upgrade pip
      - pip install -r requirements.txt -r requirements-dev.txt
      - ruff check .
      - python -m py_compile $(git ls-files '*.py')
      - pytest -q

  - name: audit
    image: python:3.12@sha256:7557a379eb0d26af063ce19906a463c7f60fb4bd03a39dea2e7ee49b7aaafc0e
    # Supply-chain CVE scan of the pinned runtime lockfile. pip-audit is the
    # canonical Python scanner (PyPA project, queries OSV + PyPI advisory DB);
    # per lang-assessment-2026 § Supply chain it is the pip equivalent of
    # cargo-audit / govulncheck. Installed as a standalone tool so its own
    # deps never perturb the pinned runtime set in requirements.txt.
    #
    # HARD GATE: the original 8-CVE backlog (starlette, python-multipart,
    # cryptography, pydantic-settings, pypdf) was cleared by the surgical
    # re-resolve in this branch, so pip-audit now fails the build on any new
    # advisory. Re-resolve the offending package(s) to bring it back green.
    commands:
      - python -m pip install --quiet --upgrade pip pip-audit
      - pip-audit -r requirements.txt --desc
