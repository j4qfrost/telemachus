# Keeps the supply-chain pins fresh so the hardening SHA/digest pins don't rot.
# Runs on GitHub (the public mirror). Note: the .woodpecker/*.yml image digests
# are NOT a Dependabot ecosystem and still need manual/renovate bumps.
version: 2
updates:
  # GitHub Actions pinned by SHA in .github/workflows/*
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  # Python deps (requirements*.txt)
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    groups:
      python:
        patterns: ["*"]

  # Dockerfile base image (python:3.12-slim digest pin)
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
