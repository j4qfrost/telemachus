# GitHub Actions — the cross-platform desktop bundles the self-hosted Linux
# Woodpecker agent can't produce. Fires on a `vX.Y.Z` tag pushed to GitHub.
#
# Each leg runs on its NATIVE OS so the platform launcher is parse-checked there
# before we ship it, then packages a relocatable source bundle (repo source +
# the self-contained start-macos.sh / launch-windows.ps1, which create the venv
# on first run — host provides Python, nothing platform-binary is bundled).
#
# Why source bundles and not a .dmg: build-macos-app.sh bakes an absolute
# INSTALL_DIR into the .app at build time, so a CI-built .dmg points at the
# runner's path and is dead on a user's Mac. build-macos-app.sh stays as a
# build-on-your-own-Mac personal launcher; CI ships the bundle that actually
# works on a clean machine.
#
# Woodpecker owns the Linux bundle + the OCI image (.woodpecker/release.yml).
name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  macos-bundle:
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Parse-check the macOS launcher
        run: bash -n start-macos.sh
      - name: Build macOS source bundle
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          out="Telemachus-macos-${tag}.tar.gz"
          git archive --format=tar.gz --prefix="telemachus-${tag}/" -o "$out" HEAD
          shasum -a 256 "$out" > "$out.sha256"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: macos-bundle
          path: Telemachus-macos-*.tar.gz*

  windows-bundle:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Parse-check the Windows launcher
        shell: pwsh
        run: |
          $errors = $null
          [void][System.Management.Automation.Language.Parser]::ParseFile("$PWD/launch-windows.ps1", [ref]$null, [ref]$errors)
          if ($errors) { $errors; exit 1 }
      - name: Build Windows source bundle
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          $out = "Telemachus-windows-$tag.zip"
          git archive --format=zip --prefix="telemachus-$tag/" -o $out HEAD
          (Get-FileHash $out -Algorithm SHA256).Hash | Out-File -Encoding ascii "$out.sha256"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-bundle
          path: Telemachus-windows-*.zip*

  publish:
    needs: [macos-bundle, windows-bundle]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
      - name: Publish to the GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: artifacts/**/*
          generate_release_notes: true
